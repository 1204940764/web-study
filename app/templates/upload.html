{% extends "base.html" %}
{% block title %}上传照片{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-nature-700 mb-6 text-center">📷 上传照片</h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">照片标题</label>
                <input type="text" name="title" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="给照片起个名字">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">照片描述（可选）</label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300 resize-none"
                          placeholder="说说这张照片的故事..."></textarea>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">选择照片</label>
                <input type="file" name="photo" accept="image/*" required
                       class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-nature-50 file:text-nature-700 hover:file:bg-nature-100">
                <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、GIF、WebP，最大 16MB</p>
            </div>
            <button type="submit"
                    class="w-full bg-nature-500 text-white py-2.5 rounded-xl hover:bg-nature-600 font-medium transition">
                上传
            </button>
        </form>
    </div>
</div>
{% endblock %}
