{% extends "base.html" %}
{% block title %}管理后台{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold text-nature-700 mb-6">管理后台</h2>

<div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
    <a href="/admin/users" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition">
        <div class="text-3xl mb-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="text-2xl font-bold text-nature-600">{{ user_count }}</div>
        <div class="text-sm text-gray-400">用户总数</div>
    </a>
    <a href="/admin/photos" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition">
        <div class="text-3xl mb-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </div>
        <div class="text-2xl font-bold text-nature-600">{{ photo_count }}</div>
        <div class="text-sm text-gray-400">照片总数</div>
    </a>
    <a href="/admin/comments" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition">
        <div class="text-3xl mb-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="text-2xl font-bold text-nature-600">{{ comment_count }}</div>
        <div class="text-sm text-gray-400">评论总数</div>
    </a>
    <a href="/admin/photos" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition border-2 border-yellow-200">
        <div class="text-3xl mb-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="text-2xl font-bold text-yellow-600">{{ pending_count }}</div>
        <div class="text-sm text-gray-400">待审核</div>
    </a>
    <a href="/admin/announcements" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition">
        <div class="text-3xl mb-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="text-2xl font-bold text-nature-600">{{ ann_count }}</div>
        <div class="text-sm text-gray-400">公告数</div>
    </a>
</div>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <a href="/admin/users" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">
            <svg class="mx-auto" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
        </span>
        <h3 class="font-bold mt-2">用户管理</h3>
        <p class="text-sm text-gray-400 mt-1">管理所有用户账号</p>
    </a>
    <a href="/admin/photos" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">
            <svg class="mx-auto" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </span>
        <h3 class="font-bold mt-2">审核照片</h3>
        <p class="text-sm text-gray-400 mt-1">审核用户上传的照片</p>
    </a>
    <a href="/admin/comments" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">
            <svg class="mx-auto" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <h3 class="font-bold mt-2">评论管理</h3>
        <p class="text-sm text-gray-400 mt-1">管理所有评论</p>
    </a>
    <a href="/admin/announcements" class="bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">
            <svg class="mx-auto" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </span>
        <h3 class="font-bold mt-2">公告管理</h3>
        <p class="text-sm text-gray-400 mt-1">发布和管理公告</p>
    </a>
</div>
{% endblock %}
