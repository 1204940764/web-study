{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-nature-700 mb-6 text-center">🌿 欢迎回来</h2>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">QQ 邮箱</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="your@qq.com">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">密码</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="请输入密码">
            </div>
            <button type="submit"
                    class="w-full bg-nature-500 text-white py-2.5 rounded-xl hover:bg-nature-600 font-medium transition">
                登录
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-4">
            还没有账号？<a href="/register" class="text-nature-600 hover:underline">去注册</a>
        </p>
        <p class="text-center text-sm text-gray-400 mt-2">
            <a href="/forgot-password" class="text-gray-400 hover:text-nature-600 transition">忘记密码？</a>
        </p>
    </div>
</div>
{% endblock %}
