{% extends "base.html" %}
{% block title %}个人中心{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md p-8 mb-6">
        <h2 class="text-2xl font-bold text-nature-700 mb-6">👤 个人中心</h2>

        <div class="space-y-4">
            <div>
                <span class="text-sm text-gray-400">邮箱</span>
                <p class="text-gray-700 font-medium">{{ current_user.email }}</p>
            </div>
            <div>
                <span class="text-sm text-gray-400">注册时间</span>
                <p class="text-gray-700">{{ current_user.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>

        <form method="POST" class="mt-6">
            <label class="block text-sm text-gray-600 mb-1">修改用户名</label>
            <div class="flex gap-2">
                <input type="text" name="username" value="{{ current_user.username }}" required
                       class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300">
                <button type="submit"
                        class="px-6 py-2.5 bg-nature-500 text-white rounded-xl hover:bg-nature-600 font-medium transition">
                    保存
                </button>
            </div>
        </form>
    </div>

    <a href="/profile/photos"
       class="block bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">📷</span>
        <h3 class="font-bold text-gray-700 mt-2">我的照片</h3>
        <p class="text-sm text-gray-400 mt-1">查看我上传的所有照片</p>
    </a>
</div>
{% endblock %}
