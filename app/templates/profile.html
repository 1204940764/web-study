{% extends "base.html" %}
{% block title %}个人中心{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">

    <!-- 基本信息 -->
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-nature-700 mb-6">个人中心</h2>

        <div class="space-y-4 mb-6">
            <div>
                <span class="text-sm text-gray-400">邮箱</span>
                <p class="text-gray-700 font-medium">{{ current_user.email }}</p>
            </div>
            <div>
                <span class="text-sm text-gray-400">注册时间</span>
                <p class="text-gray-700">{{ current_user.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>

        <form method="POST" class="border-t border-gray-100 pt-6">
            <label class="block text-sm text-gray-600 mb-1">修改用户名</label>
            <div class="flex gap-2">
                <input type="text" name="username" value="{{ current_user.username }}" required
                       class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300">
                <button type="submit"
                        class="px-6 py-2.5 bg-nature-500 text-white rounded-xl hover:bg-nature-600 font-medium transition">
                    保存
                </button>
            </div>
        </form>
    </div>

    <!-- 修改密码 -->
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h3 class="text-lg font-bold text-gray-700 mb-4">修改密码</h3>
        <form method="POST" action="/profile/password" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">原密码</label>
                <input type="password" name="old_password" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="输入原密码">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">新密码</label>
                <input type="password" name="new_password" required minlength="6"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="至少 6 位">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">确认新密码</label>
                <input type="password" name="confirm_password" required minlength="6"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="再次输入新密码">
            </div>
            <button type="submit"
                    class="w-full bg-nature-500 text-white py-2.5 rounded-xl hover:bg-nature-600 font-medium transition">
                修改密码
            </button>
        </form>
    </div>

    <!-- 我的照片入口 -->
    <a href="/profile/photos"
       class="block bg-white rounded-2xl shadow-md p-6 hover:shadow-lg transition text-center">
        <span class="text-3xl">
            <svg class="mx-auto" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </span>
        <h3 class="font-bold text-gray-700 mt-2">我的照片</h3>
        <p class="text-sm text-gray-400 mt-1">查看我上传的所有照片</p>
    </a>
</div>
{% endblock %}
