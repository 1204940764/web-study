{% extends "base.html" %}
{% block title %}我的照片{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold text-nature-700 mb-6">我的照片</h2>

{% if photos %}
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    {% for photo in photos %}
    <div class="bg-white rounded-2xl overflow-hidden shadow-md">
        <a href="/photo/{{ photo.id }}" class="block">
            <div class="aspect-square overflow-hidden bg-gray-100">
                <img src="{{ url_for('static', filename='uploads/' + (photo.thumb_filename or photo.filename)) }}"
                     alt="{{ photo.title }}"
                     class="w-full h-full object-cover"
                     loading="lazy">
            </div>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 truncate">{{ photo.title }}</h3>
            </div>
        </a>
        <div class="px-3 pb-3">
            <span class="inline-block text-xs px-2 py-0.5 rounded-full
                {% if photo.status == 'approved' %}bg-green-100 text-green-700
                {% elif photo.status == 'pending' %}bg-yellow-100 text-yellow-700
                {% else %}bg-red-100 text-red-700{% endif %}">
                {{ {'pending': '待审核', 'approved': '已通过', 'rejected': '已拒绝'}[photo.status] }}
            </span>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-20">
    <p class="text-gray-400 text-lg">还没有上传照片</p>
    <a href="/upload" class="inline-block mt-4 bg-nature-500 text-white px-6 py-2 rounded-full hover:bg-nature-600">去上传</a>
</div>
{% endif %}
{% endblock %}
