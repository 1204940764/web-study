{% extends "base.html" %}
{% block title %}提交建议{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-nature-700 mb-2">提交建议</h2>
        <p class="text-gray-400 text-sm mb-6">告诉我们网站需要完善的地方，每天限发送一条</p>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">建议内容</label>
                <textarea name="content" rows="5" required
                          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300 resize-none"
                          placeholder="请输入你的建议..."></textarea>
            </div>
            <button type="submit"
                    class="w-full bg-nature-500 text-white py-2.5 rounded-xl hover:bg-nature-600 font-medium transition">
                提交建议
            </button>
        </form>
    </div>
</div>
{% endblock %}
