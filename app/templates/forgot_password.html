{% extends "base.html" %}
{% block title %}忘记密码{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-nature-700 mb-6 text-center">重置密码</h2>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">QQ 邮箱</label>
                <input type="email" name="email" id="email" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="输入注册时使用的邮箱">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">验证码</label>
                <div class="flex gap-2">
                    <input type="text" name="code" required maxlength="6"
                           class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                           placeholder="6位数字">
                    <button type="button" id="send-code-btn" onclick="sendCode()"
                            class="px-4 py-2.5 bg-nature-100 text-nature-700 rounded-xl hover:bg-nature-200 font-medium text-sm whitespace-nowrap transition">
                        发送验证码
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">新密码</label>
                <input type="password" name="new_password" required minlength="6"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-nature-300"
                       placeholder="至少 6 位">
            </div>
            <button type="submit"
                    class="w-full bg-nature-500 text-white py-2.5 rounded-xl hover:bg-nature-600 font-medium transition">
                重置密码
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-4">
            <a href="/login" class="text-nature-600 hover:underline">返回登录</a>
        </p>
    </div>
</div>

<script>
var countdown = 0;
function sendCode() {
    var btn = document.getElementById('send-code-btn');
    var email = document.getElementById('email').value.trim();
    if (!email) { alert('请先输入邮箱'); return; }
    if (countdown > 0) return;

    btn.disabled = true;
    btn.textContent = '发送中...';

    fetch('/forgot-password/send-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'email=' + encodeURIComponent(email)
    }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
            countdown = 60;
            btn.textContent = countdown + 's 后重发';
            btn.classList.add('bg-gray-100', 'text-gray-400');
            btn.classList.remove('bg-nature-100', 'text-nature-700');
            var timer = setInterval(function() {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                    btn.classList.remove('bg-gray-100', 'text-gray-400');
                    btn.classList.add('bg-nature-100', 'text-nature-700');
                } else {
                    btn.textContent = countdown + 's 后重发';
                }
            }, 1000);
        } else {
            alert(data.msg || '发送失败');
            btn.disabled = false;
            btn.textContent = '发送验证码';
        }
    }).catch(function() {
        alert('网络错误');
        btn.disabled = false;
        btn.textContent = '发送验证码';
    });
}
</script>
{% endblock %}
